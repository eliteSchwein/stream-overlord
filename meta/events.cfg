[macro follow]
tasks:
- {"channel": "alert", "message": "${event.userDisplayName} folgt nun", "asset": "follow"}

[macro bits]
tasks:
- {"channel": "alert", "message": "${event.userDisplayName} haut ${event.bits} Bits raus", "asset": "bits"}

[macro raid]
tasks:
- {"channel": "alert", "message": "${event.userDisplayName} raidet mit ${event.viewerCount} Leuten", "asset": "raid"}

[macro sub]
tasks:
- {"channel": "alert", "message": "${event.userDisplayName} abonniert im ${event.months}. Monat auf Stufe ${plan}", "asset": "sub"}

[macro subgift]
tasks:
- {"channel": "alert", "message": "${event.gifterDisplayName} schenkt ${event.userDisplayName} ein Abo auf Stufe ${plan}", "asset": "sub"}

[macro subcommunitygift]
tasks:
- {"channel": "alert", "message": "${event.count} subs gifted from ${event.gifterDisplayName} on tier ${plan}", "asset": "sub"}

[channel_point tts]
label: 'Nachricht vorlesen'
type: macro
macro: tts_channel_point

[macro tts_channel_point]
tasks:
- {"channel": "dummy_alert", "message": "${channelPoint.userName} sagt ${channelPoint.input}", "speak": true}
- {"channel": "channel_point", "method": "accept"}