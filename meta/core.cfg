[audio alert]
default_volume: 0.8
min_range: 0
max_range: 1
steps_range: 0.05
pipewire_sink: true

[audio tts]
default_volume: 0.12
min_range: 0
max_range: 1
steps_range: 0.05
pipewire_sink: true

[include meta/music.cfg]

[shell]
play_command: 'ffplay -v 0 -nodisp -autoexit'

[websocket]
port: 8100

[webserver]
port: 8105

[logging]
debug: false
full_obs_log: false

[throttle_protection]
enable_rpi: false

[redis]
host: localhost
port: 6379
password:

[systeminfo]
message: 'System Informationen: Dev System ||'
message_spacer: ' ||'
entries:
- {"label": "CPU Usage", "short": "CPU", "icon": "cpu-64-bit", "data": {"type": "systeminfo", "method": "currentLoad", "entry": "currentLoad", "decimal": 0, "end": "%"}}
- {"label": "CPU Temp", "short": "CPU", "icon": "thermometer", "data": {"type": "systeminfo", "method": "cpuTemperature", "entry": "main", "decimal": 0, "end": "°C"}}