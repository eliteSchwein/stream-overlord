[command songrequesttoggle]
enforce_primary = true
requiresMod = true
requiresVip = false
requiresBroadcaster = false
alias = ["srtoggle"]
userCooldown = 2
globalCooldown = 1
macro = "song_request_toggle"

[macro song_request_toggle]
tasks:
- {"channel":"function","method":"song_request_toggle","data":{}}
- {"channel":"function","method":"send_message","data":{"content":"Songrequests: ${songrequest.enabled}"}}