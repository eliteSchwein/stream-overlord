[command songrequest]
enforce_primary = true
requiresMod = false
requiresVip = false
requiresBroadcaster = false
alias = ["sr"]
userCooldown = 10
globalCooldown = 2
macro = "song_request"
params = [
  {"name":"url","type":"string"}
]

[macro song_request]
tasks:
- {"channel":"condition","method":"if","check":"'${data.url}' === ''"}
- {"channel":"function","method":"send_message","data":{"content":"Bitte eine YouTube oder Deezer URL angeben."}}
- {"channel":"condition","method":"end_macro"}
- {"channel":"condition","method":"end_if"}
- {"channel":"condition","method":"if","check":"'${songrequest.enabled}' !== 'true'"}
- {"channel":"function","method":"send_message","data":{"content":"Songrequests sind aktuell deaktiviert."}}
- {"channel":"condition","method":"end_macro"}
- {"channel":"condition","method":"end_if"}
- {"channel":"condition","method":"if","check":"'${songrequest.query_blocked}' === 'true'"}
- {"channel":"function","method":"send_message","data":{"content":"Dieser Songrequest ist blockiert."}}
- {"channel":"condition","method":"end_macro"}
- {"channel":"condition","method":"end_if"}
- {"channel":"condition","method":"if","check":"'${songrequest.query_already_present}' === 'true'"}
- {"channel":"function","method":"send_message","data":{"content":"Dieser Songrequest ist bereits in der Queue."}}
- {"channel":"condition","method":"end_macro"}
- {"channel":"condition","method":"end_if"}
- {"channel":"function","method":"song_request","data":{"url":"${data.url}"}}
- {"channel":"function","method":"send_message","data":{"content":"Songrequest wurde hinzugefügt."}}
