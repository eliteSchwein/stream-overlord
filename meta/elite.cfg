[macro boost]
apis:
- ship_diagnostics

tasks:
- {"channel": "condition", "method": "if", "check": "!${api.ship_diagnostics.in_ship}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil ich aktuell nicht in ein Schiff bin."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.ship_docked}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil das Schiff angedockt ist."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.ship_landed}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil das Schiff gelandet ist."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.in_glide}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil das Schiff gerade im Gleitflug ist."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.fsd_jump}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil im Hyperraum kein Boost aktuell möglich ist."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.supercruise_overcharge_active}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil der Supercruise Overcharge aktiv ist."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.in_supercruise}"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.low_fuel}"}
- {"channel": "function", "method": "send_dm", "data": {"user": "${channelPoint.userName}", "content": "Deine Kanalpunkte wurden dir zurück gegeben weil das Schiff zu wenig Treibstoff hat."}}
- {"channel": "channel_point", "method": "cancel"}
- {"channel": "condition", "method": "end_macro"}
- {"channel": "condition", "method": "end_if"}

- {"channel": "alert", "message": "OVERCHARGE", "asset": "boost"}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["tab"]}}
- {"channel": "function", "method": "sleep", "data": {"time": 15000}}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["tab"]}}
- {"channel": "channel_point", "method": "accept"}
- {"channel": "condition", "method": "end_macro"}

- {"channel": "condition", "method": "end_if"}

- {"channel": "alert", "message": "BOOOST", "asset": "boost"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.gear_down}"}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["l"]}}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.scoop_deployed}"}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["home"]}}
- {"channel": "condition", "method": "end_if"}

- {"channel": "function", "method": "sleep", "data": {"time": 100}}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["tab"]}}
- {"channel": "function", "method": "sleep", "data": {"time": 100}}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.gear_down}"}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["l"]}}
- {"channel": "condition", "method": "end_if"}

- {"channel": "condition", "method": "if", "check": "${api.ship_diagnostics.scoop_deployed}"}
- {"channel": "websocket", "method": "trigger_keyboard", "data": {"name": "ship", "keys": ["home"]}}
- {"channel": "condition", "method": "end_if"}

- {"channel": "channel_point", "method": "accept"}


