[cava_general]
bars: 36

[cava_output]
channels: mono

[cava_input]
source: streambot_cava.monitor

[music]
cava: true
path: '$HOME/Music/Streambot'
songrequest: false
overlay_duration: 15000

[audio music]
default_volume: 0.25
min_range: 0
max_range: 1
steps_range: 0.005
pipewire_sink: true

[macro music_start]
tasks:
- {"channel": "animation", "method": "play", "data": {"target": "music_animation", "startFrame": 0, "stopFrame": 201, "frameRate": 60}}
- {"channel": "function", "method": "sleep", "data": {"time": 3350}}
- {"channel": "animation", "method": "play", "data": {"target": "music_animation", "startFrame": 201, "stopFrame": 327, "frameRate": 60, "loop": true}}

[macro music_end]
tasks:
- {"channel": "animation", "method": "play", "data": {"target": "music_animation", "startFrame": 327, "stopFrame": 417, "frameRate": 60}}