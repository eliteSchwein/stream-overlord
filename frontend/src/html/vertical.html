<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/dist/app.js"></script>
    <link rel="stylesheet" href="/dist/app.css">
    <meta charset="UTF-8">
    <title>Vertical</title>
</head>
<body>
<div style="position: relative;height: 100vh;width: 100vw;">
    <div style="position: absolute;top:0;left:0;width:500px;height:300px">
        <template path="partials/badge.html"/>
    </div>

    <div style="position: absolute;top:215px;right:12px;width:100%;calc(100vh - 215px);">
        <template path="partials/alert.html" />
    </div>

    <div style="position: absolute;top:415px;left:0;width:100%;height:calc(100vh - 415px)">
        <template path="partials/raidalert.html" />
    </div>

    <div style="position: absolute;bottom:0;left:95px;width:100%;height:335px">
        <template path="partials/music.html" />
    </div>
</div>
</body>
</html>
