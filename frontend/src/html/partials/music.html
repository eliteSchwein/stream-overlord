<div class="music d-flex justify-content-start" data-controller="music">
    <div
            data-controller="animation"
            data-target="music_animation"
            style="width: 100%; height: 100%;"
    >

        <svg id="Ebene_1" data-name="Ebene 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 50 580 220">
            <defs>
                <style>
                    .cls-1 {
                        stroke-width: 2px;
                    }

                    .cls-1, .cls-2 {
                        fill: none;
                        stroke: var(--theme-color);
                        stroke-miterlimit: 10;
                    }

                    .cls-3 {
                        fill: #4d4d4d;
                    }

                    .cls-4, .cls-5, .cls-6 {
                        fill: var(--theme-color);
                    }

                    .cls-5 {
                        font-family: Audiowide;
                        font-size: 18px;
                        font-variation-settings: 'wght' 400;
                    }

                    .cls-6 {
                        font-family: "Doto Black";
                        font-size: 14px;
                        font-variation-settings: 'wght' 300;
                        font-weight: 300;
                    }

                    .cls-7 {
                        fill: #353535;
                    }


                    /* self-contained animation: build -> idle shine -> dismantle */
                    svg {
                        overflow: visible;
                    }

                    .cls-1,
                    .cls-2 {
                        stroke-dasharray: 900;
                        stroke-dashoffset: 900;
                        animation:
                                svg-build-line 1.8s cubic-bezier(.65, 0, .25, 1) var(--build-delay, 0s) forwards,
                                svg-dismantle-line 1.15s cubic-bezier(.75, 0, .25, 1) forwards var(--dismantle-line-delay, 5.7s);
                    }

                    /* directional build order matching the marked arrows */
                    .svg-line-main { --build-delay: .00s; }
                    .svg-line-right { --build-delay: 1.05s; --dismantle-line-delay: 5.70s; }
                    .svg-line-right-node { --build-delay: 1.32s; --dismantle-line-delay: 5.45s; }
                    .svg-line-bottom { --build-delay: 1.45s; }
                    .svg-line-frame { --build-delay: 1.55s; }

                    /* normal fill elements */
                    .cls-3,
                    .cls-4 {
                        opacity: var(--theme-opacity-hidden, 0);
                        transform-box: fill-box;
                        transform-origin: center;
                        animation:
                                svg-build-fill .75s ease forwards 1.15s,
                                svg-dismantle-fill .75s ease forwards var(--dismantle-fill-delay, 5.55s);
                    }

                    /* text: opacity only, so SVG translate() stays untouched */
                    .svg-text-line {
                        opacity: var(--theme-opacity-hidden, 0);
                        animation:
                                svg-build-opacity .75s ease forwards 1.15s,
                                svg-dismantle-opacity .75s ease forwards var(--dismantle-fill-delay, 5.55s);
                    }

                    /* thumbnail image: joins build/end animation, stays untouched during idle */
                    .svg-thumbnail-wrap {
                        opacity: var(--theme-opacity-hidden, 0);
                        transform-box: fill-box;
                        transform-origin: center;
                        animation:
                                svg-build-thumbnail .75s ease forwards .85s,
                                svg-dismantle-thumbnail .75s ease forwards 5.55s;
                    }

                    /* top accent grows left -> right, dismantles last in the reversed right-side order */
                    .svg-top-accent {
                        --dismantle-fill-delay: 6.20s;
                        transform-origin: left center;
                        animation:
                                svg-build-fill-x .55s ease forwards .05s,
                                svg-dismantle-fill-x .75s ease forwards var(--dismantle-fill-delay, 6.20s);
                    }

                    /* small top-right rect grows top -> bottom, dismantles after the right line */
                    .svg-build-accent {
                        --dismantle-fill-delay: 5.95s;
                        transform-origin: top center;
                        animation:
                                svg-build-fill-y .45s ease forwards .62s,
                                svg-dismantle-fill-y .55s ease forwards var(--dismantle-fill-delay, 5.95s);
                    }

                    /* visualizer bars only get start/end animation; idle is left completely free for JS */
                    #musik_striche rect,
                    .svg-visualizer-bar {
                        transform-origin: bottom center;
                        animation:
                                svg-build-fill-y .75s ease forwards 1.15s,
                                svg-dismantle-fill-y .75s ease forwards 5.55s;
                    }

                    /* moving shine sweep over the whole graphic */
                    #svg-shine-sweep {
                        opacity: var(--theme-opacity-hidden, 0);
                        animation:
                                svg-shine-sweep 1.55s ease-in-out infinite 2.15s,
                                svg-shine-off .2s linear forwards 5.45s;
                        pointer-events: none;
                    }

                    #Ebene_1 {
                        animation: svg-idle-glow 1.8s ease-in-out infinite 2.0s;
                    }

                    @keyframes svg-build-line {
                        to {
                            stroke-dashoffset: 0;
                        }
                    }

                    @keyframes svg-dismantle-line {
                        to {
                            stroke-dashoffset: -900;
                            opacity: var(--theme-opacity-hidden, 0);
                        }
                    }

                    @keyframes svg-build-fill {
                        from {
                            opacity: var(--theme-opacity-hidden, 0);
                            transform: scale(.86);
                        }
                        to {
                            opacity: var(--theme-opacity-visible, 1);
                            transform: scale(1);
                        }
                    }

                    @keyframes svg-dismantle-fill {
                        to {
                            opacity: var(--theme-opacity-hidden, 0);
                            transform: scale(.82);
                        }
                    }

                    @keyframes svg-build-opacity {
                        from { opacity: var(--theme-opacity-hidden, 0); }
                        to { opacity: var(--theme-opacity-visible, 1); }
                    }

                    @keyframes svg-dismantle-opacity {
                        to { opacity: var(--theme-opacity-hidden, 0); }
                    }

                    @keyframes svg-build-thumbnail {
                        from { opacity: var(--theme-opacity-hidden, 0); transform: scale(.88); }
                        to { opacity: var(--theme-opacity-visible, 1); transform: scale(1); }
                    }

                    @keyframes svg-dismantle-thumbnail {
                        to { opacity: var(--theme-opacity-hidden, 0); transform: scale(.88); }
                    }

                    @keyframes svg-build-fill-x {
                        from { opacity: var(--theme-opacity-hidden, 0); transform: scaleX(0); }
                        to { opacity: var(--theme-opacity-visible, 1); transform: scaleX(1); }
                    }

                    @keyframes svg-dismantle-fill-x {
                        to { opacity: var(--theme-opacity-hidden, 0); transform: scaleX(0); }
                    }

                    @keyframes svg-build-fill-y {
                        from { opacity: var(--theme-opacity-hidden, 0); transform: scaleY(0); }
                        to { opacity: var(--theme-opacity-visible, 1); transform: scaleY(1); }
                    }

                    @keyframes svg-dismantle-fill-y {
                        to { opacity: var(--theme-opacity-hidden, 0); transform: scaleY(0); }
                    }

                    @keyframes svg-idle-glow {
                        0%, 100% {
                            filter: drop-shadow(0 0 1px rgb(from var(--theme-color) r g b / var(--theme-glow-opacity-low, .18)));
                        }
                        50% {
                            filter: drop-shadow(0 0 8px rgb(from var(--theme-color) r g b / var(--theme-glow-opacity-high, .48)));
                        }
                    }

                    @keyframes svg-shine-sweep {
                        0% {
                            opacity: var(--theme-opacity-hidden, 0);
                            transform: translateX(-270px) skewX(-14deg);
                        }
                        18% {
                            opacity: var(--theme-shine-opacity-peak, .85);
                        }
                        52% {
                            opacity: var(--theme-shine-opacity-mid, .45);
                        }
                        100% {
                            opacity: var(--theme-opacity-hidden, 0);
                            transform: translateX(520px) skewX(-14deg);
                        }
                    }

                    @keyframes svg-shine-off {
                        to { opacity: var(--theme-opacity-hidden, 0); }
                    }

                    @media (prefers-reduced-motion: reduce) {
                        .cls-1,
                        .cls-2,
                        .cls-3,
                        .cls-4,
                        .cls-5,
                        .cls-6,
                        .svg-text-line,
                        .svg-thumbnail-wrap,
                        #svg-shine-sweep,
                        #Ebene_1 {
                            animation: none !important;
                            opacity: var(--theme-opacity-visible, 1) !important;
                            stroke-dashoffset: 0 !important;
                            transform: none !important;
                            filter: none !important;
                        }
                    }

                </style>
                <linearGradient id="svg-shine-gradient" x1="0%" y1="0%" x2="100%" y2="0%">

                    <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
                    <stop offset="50%" stop-color="#ffffff" stop-opacity="var(--theme-shine-stop-opacity, 0.75)"/>
                    <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </linearGradient>
