<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/dist/app.js"></script>
    <link rel="stylesheet" href="/dist/app.css">
    <meta charset="UTF-8">
    <title>General Alert</title>
</head>
<body>
    <div
            data-alert-channel="general"
            data-target="generic_alert_animation"
            data-controller="alert">
        <!-- Video Alert -->
        <svg id="Ebene_1" data-name="Ebene 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1082.17">
            <defs>
                <style>
                    .cls-1 { fill: var(--theme-color); }
                    .cls-2 {
                        fill: none;
                        stroke: var(--theme-color);
                        stroke-miterlimit: 10;
                        stroke-width: 6px;
                    }
                    .cls-3 { fill: #282828; }

                    /* self-contained animation: build -> buffer -> idle shine -> buffer -> dismantle */
                    :root {
                        --build-time: 1.8s;
                        --idle-delay: 3.80s;
                        --dismantle-delay: 6.10s;
                    }

                    svg { overflow: visible; }

                    #video-wrap {
                        opacity: 0;
                        animation:
                                svg-build-video .25s ease forwards 2s,
                                svg-dismantle-video .35s ease forwards 5.55s;
                    }

                    .cls-2 {
                        stroke-dasharray: 5600;
                        stroke-dashoffset: 5600;
                        animation:
                                svg-build-line var(--build-time) cubic-bezier(.65, 0, .25, 1) var(--build-delay, 0s) forwards,
                                svg-dismantle-line 1.15s cubic-bezier(.75, 0, .25, 1) forwards var(--dismantle-line-delay, var(--dismantle-delay));
                    }

                    .cls-1,
                    .cls-3 {
                        opacity: 0;
                        transform-box: fill-box;
                        transform-origin: center;
                        animation:
                                svg-build-fill .75s ease forwards var(--build-fill-delay, 1.15s),
                                svg-dismantle-fill .75s ease forwards var(--dismantle-fill-delay, 5.55s);
                    }

                    /* top chunks: build from top-right, then reverse out.
                       Uses scaleX + tiny flicker so the slanted blocks feel like the other SVGs. */
                    .svg-top-accent {
                        opacity: 0;
                        transform-box: fill-box;
                        transform-origin: right center;
                        filter: drop-shadow(0 0 0 rgb(from var(--theme-color) r g b / 0));
                        animation:
                                svg-top-accent-build .42s cubic-bezier(.65, 0, .25, 1) forwards var(--build-fill-delay),
                                svg-top-accent-idle 1.45s ease-in-out infinite var(--idle-delay),
                                svg-top-accent-dismantle .42s cubic-bezier(.75, 0, .25, 1) forwards var(--dismantle-fill-delay);
                    }

                    /* right -> middle -> left */
                    .svg-top-accent-1 { --build-fill-delay: .31s; --dismantle-fill-delay: 6.95s; }
                    .svg-top-accent-2 { --build-fill-delay: .18s; --dismantle-fill-delay: 7.08s; }
                    .svg-top-accent-3 { --build-fill-delay: .05s; --dismantle-fill-delay: 7.21s; }

                    .svg-top-dark {
                        --build-fill-delay: .28s;
                        --dismantle-fill-delay: 6.85s;
                        transform-origin: right center;
                        animation:
                                svg-build-fill-x .55s ease forwards var(--build-fill-delay),
                                svg-dismantle-fill-x .65s ease forwards var(--dismantle-fill-delay);
                    }

                    .svg-right-accent {
                        --build-fill-delay: .52s;
                        --dismantle-fill-delay: 6.65s;
                        transform-origin: top center;
                        animation:
                                svg-build-fill-y .45s ease forwards var(--build-fill-delay),
                                svg-dismantle-fill-y .55s ease forwards var(--dismantle-fill-delay);
                    }

                    .svg-bottom-left-accent { --build-fill-delay: 1.35s; --dismantle-fill-delay: 6.25s; }
                    .svg-left-bar { --build-fill-delay: 1.45s; --dismantle-fill-delay: 6.20s; transform-origin: top center; }

                    .svg-line-top-right { --build-delay: .00s; --dismantle-line-delay: 6.80s; }
                    .svg-line-right-outside { --build-delay: .40s; --dismantle-line-delay: 6.60s; }
                    .svg-line-main-right { --build-delay: .65s; --dismantle-line-delay: 6.40s; }
                    .svg-line-main-left { --build-delay: .95s; --dismantle-line-delay: 6.25s; }
                    .svg-line-bottom { --build-delay: 1.25s; --dismantle-line-delay: 6.15s; }
                    .svg-line-node { --build-delay: 1.38s; --dismantle-line-delay: 6.05s; }

                    #svg-shine-sweep {
                        opacity: 0;
                        clip-path: url(#video-mask);
                        pointer-events: none;
                        animation:
                                svg-shine-sweep 1.55s ease-in-out infinite 3.80s,
                                svg-shine-off .2s linear forwards 5.45s;
                    }

                    #Ebene_1 { animation: svg-idle-glow 1.8s ease-in-out infinite var(--idle-delay); }

                    @keyframes svg-build-line { to { stroke-dashoffset: 0; } }
                    @keyframes svg-dismantle-line { to { stroke-dashoffset: -5600; opacity: 0; } }

                    @keyframes svg-build-fill {
                        from { opacity: 0; transform: scale(.86); }
                        to { opacity: 1; transform: scale(1); }
                    }
                    @keyframes svg-dismantle-fill { to { opacity: 0; transform: scale(.82); } }

                    @keyframes svg-build-video {
                        from { opacity: 0; }
                        to { opacity: 1; }
                    }
                    @keyframes svg-dismantle-video {
                        to { opacity: 0; }
                    }

                    @keyframes svg-build-fill-x {
                        from { opacity: 0; transform: scaleX(0); }
                        to { opacity: 1; transform: scaleX(1); }
                    }
                    @keyframes svg-dismantle-fill-x { to { opacity: 0; transform: scaleX(0); } }

                    @keyframes svg-top-accent-build {
                        0% { opacity: 0; transform: scaleX(0) translateX(10px); }
                        60% { opacity: 1; transform: scaleX(1.04) translateX(0); }
                        100% { opacity: 1; transform: scaleX(1) translateX(0); }
                    }

                    @keyframes svg-top-accent-idle {
                        0%, 100% { filter: drop-shadow(0 0 1px rgb(from var(--theme-color) r g b / var(--theme-glow-alpha-low))); }
                        46% { filter: drop-shadow(0 0 7px rgb(from var(--theme-color) r g b / var(--theme-glow-alpha-mid))); }
                        50% { filter: drop-shadow(0 0 12px rgb(255 255 255 / var(--theme-glow-alpha-white))); }
                        54% { filter: drop-shadow(0 0 7px rgb(from var(--theme-color) r g b / var(--theme-glow-alpha-mid))); }
                    }

                    @keyframes svg-top-accent-dismantle {
                        0% { opacity: 1; transform: scaleX(1) translateX(0); }
                        100% { opacity: 0; transform: scaleX(0) translateX(10px); }
                    }

                    @keyframes svg-build-fill-y {
                        from { opacity: 0; transform: scaleY(0); }
                        to { opacity: 1; transform: scaleY(1); }
                    }
                    @keyframes svg-dismantle-fill-y { to { opacity: 0; transform: scaleY(0); } }

                    @keyframes svg-idle-glow {
                        0%, 100% { filter: drop-shadow(0 0 1px rgb(from var(--theme-color) r g b / var(--theme-glow-alpha-low))); }
                        50% { filter: drop-shadow(0 0 10px rgb(from var(--theme-color) r g b / var(--theme-glow-alpha-high))); }
                    }

                    @keyframes svg-shine-sweep {
                        0% { opacity: 0; transform: translateX(-420px) skewX(-14deg); }
                        18% { opacity: var(--theme-shine-opacity-peak); }
                        52% { opacity: var(--theme-shine-opacity-mid); }
                        100% { opacity: 0; transform: translateX(2100px) skewX(-14deg); }
                    }

                    @keyframes svg-shine-off { to { opacity: 0; } }

                    @media (prefers-reduced-motion: reduce) {
                        .cls-1, .cls-2, .cls-3, #video-wrap, #svg-shine-sweep, #Ebene_1 {
                            animation: none !important;
                            opacity: 1 !important;
                            stroke-dashoffset: 0 !important;
                            transform: none !important;
                            filter: none !important;
                        }
                    }
                </style>

                <linearGradient id="svg-shine-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
                    <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
                    <stop offset="50%" stop-color="#ffffff" stop-opacity="var(--theme-shine-stop-opacity)"/>
                    <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </linearGradient>

                <clipPath id="video-mask" clipPathUnits="userSpaceOnUse">
                    <path d="M203.23 71.91 L1397.31 71.91 L1484.58 142.21 L1717.13 140.91 L1717.13 467.68 L1674.42 480.19 L1677.3 748.69 L1717.13 761.2 L1717.13 987.8 L714.14 987.8 L698.82 1017.63 L381.23 1016.7 L392.25 1034.93 L177.54 1034.93 L177.54 860.41 L184.88 860.41 L184.88 357.63 L149.5 328.01 L149.5 164.1 L203.94 125.3 Z"/>
                </clipPath>
            </defs>

            <g id="video-wrap" clip-path="url(#video-mask)">
                <foreignObject x="0" y="0" width="1920" height="1082.17">
                    <video xmlns="http://www.w3.org/1999/xhtml"
                           src="/thargoid.mp4"
                           muted="muted"
                           playsinline="playsinline"
                           preload="auto"
                           style="width:100%;height:100%;object-fit:cover;display:block;"></video>
                </foreignObject>
            </g>

            <!-- use as mask for video -->
            <polygon class="cls-1 svg-bottom-left-accent" points="392.25 1034.93 177.54 1034.93 177.54 997.24 378.1 997.24 392.25 1034.93"/>
            <polyline class="cls-2 svg-line-main-right" points="1481.41 140.91 1717.13 139.81 1717.13 467.68 1674.42 480.19 1677.3 748.69 1717.13 761.2 1717.13 987.8 714.14 987.8 698.82 1017.63 381.23 1016.7"/>
            <polyline class="cls-2 svg-line-main-left" points="184.88 897.82 184.88 357.63 149.5 328.01 149.5 164.1 203.94 125.3 203.23 71.91 1397.31 71.91 1484.58 142.21"/>
            <rect class="cls-1 svg-left-bar" x="177.54" y="860.41" width="14.68" height="174.52"/>

            <!-- other crap -->
            <polygon class="cls-1 svg-top-accent svg-top-accent-1"
                     points="1438.27 74.85 1507.11 74.85 1569.54 123.79 1504.93 123.79"/>

            <polygon class="cls-1 svg-top-accent svg-top-accent-2"
                     points="1548.08 74.85 1612.35 74.85 1674.79 123.79 1609.56 123.79"/>
            <polygon class="cls-1 svg-top-accent svg-top-accent-3"
                     points="1651.33 74.85 1756.28 74.85 1756.28 123.79 1712.81 123.79"/>
            <rect class="cls-1 svg-right-accent" x="1739.41" y="111.2" width="18.87" height="122.68"/>
            <polyline class="cls-2 svg-line-top-right" points="1748.84 233.89 1748.84 481.35 1701.88 495.34 1701.66 664.85"/>
            <polyline class="cls-2 svg-line-right-outside" points="748.1 1012.97 1773.47 1012.97 1773.47 952.55 1773.2 741.55 1726.23 727.41 1726.23 676.53 1726.23 679.57 1726.45 508.2 1773.42 494.06 1773.42 243.88 1773.91 309.08 1773.91 117.21 1773.91 47.24 1429.98 47.24 173.99 47.24 173.99 81.12"/>
            <circle class="cls-2 svg-line-node" cx="732.08" cy="1012.97" r="16.01"/>
            <circle class="cls-2 svg-line-node" cx="1701.12" cy="680.86" r="16.01"/>
            <circle class="cls-2 svg-line-node" cx="173.99" cy="99.32" r="16.01"/>

            <rect id="svg-shine-sweep" x="-160" y="47" width="190" height="990" fill="url(#svg-shine-gradient)"/>
        </svg>
    </div>
</body>
</html>
